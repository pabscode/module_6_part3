name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]  # triggers when code is pushed to main branch
  workflow_dispatch:       # allows manual trigger from GitHub Actions UI

permissions:
  contents: write   # allows committing and pushing to repos
  packages: write   # allows pushing docker images to ghcr.io

concurrency:
  group: gitops-${{ github.ref }}
  cancel-in-progress: false  # dont cancel in progress runs, wait for them to finish

env:
  REGISTRY: ghcr.io  # github container registry where images will be stored
  SERVICES: backend,transactions,studentportfolio,syncer  # all services to build
  TARGET_BRANCH: main  # branch to push gitops changes to

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest  # use githubs hosted ubuntu runner
    strategy:
      matrix:
        service: [backend, transactions, studentportfolio, syncer]  # run this job for each service
    steps:
      - name: Checkout
        uses: actions/checkout@v4  # checkout the code from the repo
        with:
          fetch-depth: 0

      - name: Check service has a Dockerfile
        id: check
        run: |
          # check if a dockerfile exists for this service
          # if not skip the build step
          if [ -f "./${{ matrix.service }}/Dockerfile" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            echo "build=false" >> "$GITHUB_OUTPUT"
            echo "No Dockerfile for ${{ matrix.service }} — skipping."
          fi

      - name: Log in to GHCR
        if: steps.check.outputs.build == 'true'  # only run if dockerfile exists
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}  # your github username
          password: ${{ secrets.CR_PAT }}           # token stored as github secret

      - name: Set up Docker Buildx
        if: steps.check.outputs.build == 'true'  # only run if dockerfile exists
        uses: docker/setup-buildx-action@v3       # sets up docker buildx for building images

      - name: Build & push ${{ matrix.service }}
        if: steps.check.outputs.build == 'true'  # only run if dockerfile exists
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}  # build from the service folder
          push: true                         # push the image to ghcr.io
          tags: |
            # tag with latest and commit SHA so every build is unique
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ github.event.repository.name }}-${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ github.event.repository.name }}-${{ matrix.service }}:${{ github.sha }}
          provenance: false
          sbom: false

  update-gitops:
    name: Update GitOps manifests
    runs-on: ubuntu-latest
    needs: build-and-push  # only runs after all images are successfully built and pushed
    steps:
      - name: Checkout app repo (for k8s folder)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update GitOps repository (handles empty repo)
        shell: bash
        env:
          REGISTRY: ${{ env.REGISTRY }}
          OWNER: ${{ github.repository_owner }}
          APP_REPO: ${{ github.event.repository.name }}
          GITOPS_REPO: ${{ secrets.GITOPS_REPO }}   # gitops repo name stored as secret
          GIT_TOKEN: ${{ secrets.GITOPS_PAT }}       # gitops token stored as secret
          TARGET_BRANCH: ${{ env.TARGET_BRANCH }}
        run: |
          set -euo pipefail

          # set up git identity and credentials so pipeline can commit
          git config --global user.name  "GitHub Actions"
          git config --global user.email "actions@github.com"
          git config --global credential.helper store
          printf "https://%s:x-oauth-basic@github.com\n" "$GIT_TOKEN" > ~/.git-credentials

          # clone the gitops repo or initialize it if it doesnt exist yet
          workdir="$(mktemp -d)"
          echo "Cloning GitOps repo ${GITOPS_REPO} ..."
          if git clone "https://github.com/${GITOPS_REPO}.git" "$workdir/gitops"; then
            cd "$workdir/gitops"
          else
            echo "Repo not found or no access, initializing new repository structure..."
            mkdir -p "$workdir/gitops"
            cd "$workdir/gitops"
            git init
            git remote add origin "https://github.com/${GITOPS_REPO}.git"
          fi

          # make sure we are on the correct branch even if repo is empty
          if ! git rev-parse --verify HEAD >/dev/null 2>&1; then
            git checkout --orphan "${TARGET_BRANCH}"
          else
            if git ls-remote --exit-code --heads origin "${TARGET_BRANCH}" >/dev/null 2>&1; then
              git checkout "${TARGET_BRANCH}"
            else
              git checkout -b "${TARGET_BRANCH}"
            fi
          fi

          # copy k8s manifests from main repo into gitops repo
          if [ ! -d "${GITHUB_WORKSPACE}/k8s" ]; then
            echo "::warning:: No k8s/ directory found in app repo; nothing to copy."
            mkdir -p k8s
          else
            if command -v rsync >/dev/null 2>&1; then
              rsync -a --delete "${GITHUB_WORKSPACE}/k8s/" "./k8s/"
            else
              rm -rf ./k8s
              mkdir -p ./k8s
              cp -R "${GITHUB_WORKSPACE}/k8s/." "./k8s/"
            fi
          fi

          # replace any placeholder image names with real owner and repo name
          find k8s -type f -name "*deployment*.yaml" -print0 | xargs -0 sed -i -E \
            "s|image:\s*ghcr\.io/OWNER/REPO-([a-z0-9._-]+):[^[:space:]]+|image: ${REGISTRY}/${OWNER}/${APP_REPO}-\1:latest|g"

          # remove any windows line endings or trailing spaces
          find k8s -type f -name "*deployment*.yaml" -print0 | xargs -0 sed -i 's/\r$//; s/[[:space:]]\+$//'

          # update image tags in all deployment files to the current commit SHA
          # this ensures every deployment uses the exact image that was just built
          while IFS= read -r -d '' f; do
            sed -i -E "s|(image:\s*${REGISTRY}/${OWNER}/${APP_REPO}-[a-z0-9._-]+:)[^[:space:]]+|\1${GITHUB_SHA}|g" "$f"
          done < <(find k8s -type f -name "*deployment*.yaml" -print0)

          shopt -s nullglob
          mapfile -d '' files < <(find k8s -type f -name "*deployment*.yaml" -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::warning:: No deployment YAMLs found under k8s/. Skipping tag bump."
          else
            for f in "${files[@]}"; do
              # bump each deployment file image tag to current commit SHA
              sed -i -E "s|(image:\s*${REGISTRY}/${OWNER}/${APP_REPO}-[a-z0-9._-]+:)[^[:space:]]+|\\1${GITHUB_SHA}|g" "$f"
            done
          fi

          # commit and push changes to gitops repo if anything changed
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."  # nothing changed so skip commit
          else
            git commit -m "GitOps: update images to ${GITHUB_SHA}"  # commit with the commit SHA as message
          fi

          # push the updated manifests to the gitops repo
          git remote remove origin >/dev/null 2>&1 || true
          git remote add origin "https://${GIT_TOKEN}@github.com/${GITOPS_REPO}.git"
          git push -u origin "${TARGET_BRANCH}"